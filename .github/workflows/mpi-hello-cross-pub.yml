name: MPI Hello World Cross-Platform Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: hello-mpi
  MPI_RANKS: 4

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t "$IMAGE_NAME" .

      - name: Show runner and container CPU info
        run: |
          echo "Runner CPU count (nproc): $(nproc)"
          echo "Runner CPU summary:"
          lscpu | grep -E '^CPU\(s\):|^Model name:|^Thread\(s\) per core:|^Core\(s\) per socket:|^Socket\(s\):' || true
          echo
          echo "Container CPU count (nproc):"
          docker run --rm "$IMAGE_NAME" nproc
          echo "Container cpuset (if present):"
          docker run --rm "$IMAGE_NAME" sh -lc 'cat /sys/fs/cgroup/cpuset.cpus.effective 2>/dev/null || cat /sys/fs/cgroup/cpuset/cpuset.cpus 2>/dev/null || true'
          echo "Container cpu.max (if present):"
          docker run --rm "$IMAGE_NAME" sh -lc 'cat /sys/fs/cgroup/cpu.max 2>/dev/null || true'

      - name: Run MPI program and capture output
        run: |
          docker run --rm "$IMAGE_NAME" \
            mpirun --allow-run-as-root --oversubscribe -n "$MPI_RANKS" /app/hello_mpi \
            | tee mpi-output.log

      - name: Verify all ranks printed output
        id: verify
        run: |
          count=$(grep -c "Hello from rank" mpi-output.log || true)
          if [ "$count" -ne "$MPI_RANKS" ]; then
            echo "Expected $MPI_RANKS rank lines, got $count"
            exit 1
          fi

      - name: Upload MPI output log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mpi-output
          path: mpi-output.log

      - name: Set up QEMU
        if: steps.verify.outcome == 'success'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.verify.outcome == 'success'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.verify.outcome == 'success'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.verify.outcome == 'success'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish multi-arch image
        if: steps.verify.outcome == 'success'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
